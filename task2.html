<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.calculator{
    width:350px;
    background:#222;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

#display{
    width:100%;
    height:70px;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
    background:#111;
    color:#fff;
    font-size:32px;
    text-align:right;
    padding:10px;
    outline:none;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:65px;
    border:none;
    border-radius:10px;
    font-size:22px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:scale(1.05);
}

.number{
    background:#444;
    color:white;
}

.operator{
    background:#ff9500;
    color:white;
}

.clear{
    background:#ff3b30;
    color:white;
}

.equal{
    background:#34c759;
    color:white;
}

.zero{
    grid-column:span 2;
}
</style>
</head>
<body>

<div class="calculator">

<input type="text" id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">AC</button>
<button class="clear" onclick="deleteLast()">⌫</button>
<button class="operator" onclick="append('%')">%</button>
<button class="operator" onclick="append('/')">÷</button>

<button class="number" onclick="append('7')">7</button>
<button class="number" onclick="append('8')">8</button>
<button class="number" onclick="append('9')">9</button>
<button class="operator" onclick="append('*')">×</button>

<button class="number" onclick="append('4')">4</button>
<button class="number" onclick="append('5')">5</button>
<button class="number" onclick="append('6')">6</button>
<button class="operator" onclick="append('-')">−</button>

<button class="number" onclick="append('1')">1</button>
<button class="number" onclick="append('2')">2</button>
<button class="number" onclick="append('3')">3</button>
<button class="operator" onclick="append('+')">+</button>

<button class="number zero" onclick="append('0')">0</button>
<button class="number" onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

</div>

</div>

<script>
const display = document.getElementById("display");

// Append value
function append(value){
    display.value += value;
}

// Clear display
function clearDisplay(){
    display.value = "";
}

// Delete last character
function deleteLast(){
    display.value = display.value.slice(0,-1);
}

// Calculate result
function calculate(){
    try{
        if(display.value.trim()===""){
            display.value="";
            return;
        }

        const result = eval(display.value);

        if(result===Infinity || isNaN(result)){
            display.value="Error";
        }else{
            display.value=result;
        }

    }catch{
        display.value="Error";
    }
}

// Keyboard support
document.addEventListener("keydown",function(e){

    const key=e.key;

    if((key>='0' && key<='9') ||
       ['+','-','*','/','.','%'].includes(key)){
        append(key);
    }

    else if(key==="Enter"){
        e.preventDefault();
        calculate();
    }

    else if(key==="Backspace"){
        deleteLast();
    }

    else if(key==="Escape"){
        clearDisplay();
    }

});
</script>

</body>
</html>
