<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
    padding:40px 20px;
}

.container{
    width:100%;
    max-width:700px;
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.input-area{
    display:grid;
    grid-template-columns:2fr 1fr auto;
    gap:10px;
    margin-bottom:20px;
}

input{
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
    font-size:15px;
}

.add{
    background:#28a745;
}

.edit{
    background:#ffc107;
    color:black;
}

.delete{
    background:#dc3545;
}

.complete{
    background:#007bff;
}

ul{
    list-style:none;
}

li{
    background:#f5f5f5;
    margin:12px 0;
    padding:15px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

.completed span{
    text-decoration:line-through;
    color:gray;
}

.task-info{
    flex:1;
}

.task-info small{
    display:block;
    color:#666;
    margin-top:5px;
}

.actions{
    display:flex;
    gap:8px;
}

@media(max-width:600px){

.input-area{
grid-template-columns:1fr;
}

.actions{
width:100%;
justify-content:center;
}

}
</style>

</head>
<body>

<div class="container">

<h1>📝 To-Do List</h1>

<div class="input-area">
<input type="text" id="task" placeholder="Enter Task">
<input type="datetime-local" id="dateTime">
<button class="add" onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

</div>

<script>

let editIndex=-1;

function addTask(){

const task=document.getElementById("task").value.trim();
const date=document.getElementById("dateTime").value;

if(task===""){
alert("Please enter a task.");
return;
}

if(editIndex===-1){

createTask(task,date,false);

}
else{

const item=document.querySelectorAll("#taskList li")[editIndex];

item.querySelector(".task-text").textContent=task;
item.querySelector("small").textContent=date?`Due: ${date}`:"No Date";

editIndex=-1;

document.querySelector(".add").textContent="Add";

}

document.getElementById("task").value="";
document.getElementById("dateTime").value="";

}

function createTask(task,date,completed){

const li=document.createElement("li");

if(completed) li.classList.add("completed");

li.innerHTML=`
<div class="task-info">
<span class="task-text">${task}</span>
<small>${date?`Due: ${date}`:"No Date"}</small>
</div>

<div class="actions">
<button class="complete">✔</button>
<button class="edit">Edit</button>
<button class="delete">Delete</button>
</div>
`;

li.querySelector(".complete").onclick=function(){
li.classList.toggle("completed");
};

li.querySelector(".delete").onclick=function(){
li.remove();
};

li.querySelector(".edit").onclick=function(){

document.getElementById("task").value=li.querySelector(".task-text").textContent;

const due=li.querySelector("small").textContent.replace("Due: ","");

if(due!=="No Date")
document.getElementById("dateTime").value=due;

editIndex=[...document.querySelectorAll("#taskList li")].indexOf(li);

document.querySelector(".add").textContent="Update";

};

document.getElementById("taskList").appendChild(li);

}

</script>

</body>
</html>
